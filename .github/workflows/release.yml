name: Build and Release ARM64 AppImage

on:
  schedule:
    - cron: "1 0,12 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Bitwarden desktop version (e.g. 2026.1.1). Leave empty for latest."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: bitwarden-arm64-release
  cancel-in-progress: false

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      upstream_url: ${{ steps.check.outputs.upstream_url }}
      upstream_name: ${{ steps.check.outputs.upstream_name }}
      upstream_found: ${{ steps.check.outputs.upstream_found }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream release and check existing repo release
        id: check
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          api_get_json() {
            local url="$1"
            local attempts=6
            local delay=2
            local n
            local response
            local http_code
            local body
            for n in $(seq 1 "$attempts"); do
              response="$(curl -sSL -w '\n%{http_code}' \
                -H 'Accept: application/vnd.github+json' \
                -H 'User-Agent: bitwarden-aarch64-actions' \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                "$url" || true)"
              http_code="${response##*$'\n'}"
              body="${response%$'\n'*}"

              if [[ "$http_code" == "200" ]]; then
                printf '%s\n' "$body"
                return 0
              fi
              if [[ "$n" -lt "$attempts" ]]; then
                echo "API request failed ($n/$attempts) with HTTP ${http_code}, retrying in ${delay}s: $url"
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            echo "Failed to query API after retries (last HTTP ${http_code}): $url" >&2
            return 1
          }

          api_get_json_optional_404() {
            local url="$1"
            local attempts=6
            local delay=2
            local n
            local response
            local http_code
            local body
            for n in $(seq 1 "$attempts"); do
              response="$(curl -sSL -w '\n%{http_code}' \
                -H 'Accept: application/vnd.github+json' \
                -H 'User-Agent: bitwarden-aarch64-actions' \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                "$url" || true)"
              http_code="${response##*$'\n'}"
              body="${response%$'\n'*}"

              if [[ "$http_code" == "200" ]]; then
                printf '%s\n' "$body"
                return 0
              fi
              if [[ "$http_code" == "404" ]]; then
                return 0
              fi
              if [[ "$n" -lt "$attempts" ]]; then
                echo "API request failed ($n/$attempts) with HTTP ${http_code}, retrying in ${delay}s: $url"
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            echo "Failed to query API after retries (last HTTP ${http_code}): $url" >&2
            return 1
          }

          if [[ -n "${INPUT_VERSION}" ]]; then
            TAG="desktop-v${INPUT_VERSION}"
            API_URL="https://api.github.com/repos/bitwarden/clients/releases/tags/${TAG}"
            RELEASE_JSON="$(api_get_json_optional_404 "$API_URL")"
          else
            API_URL="https://api.github.com/repos/bitwarden/clients/releases?per_page=100"
            RELEASE_JSON="$(
              api_get_json "$API_URL" | jq -crf scripts/select-desktop-release.jq
            )"
          fi

          if [[ -z "$RELEASE_JSON" ]]; then
            if [[ -n "${INPUT_VERSION}" ]]; then
              echo "No matching Desktop release tag was found for desktop-v${INPUT_VERSION}."
            else
              echo "No stable Desktop release with the expected AppImage asset was found."
            fi
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "upstream_found=false" >> "$GITHUB_OUTPUT"
            echo "upstream_tag=" >> "$GITHUB_OUTPUT"
            echo "upstream_version=" >> "$GITHUB_OUTPUT"
            echo "upstream_url=" >> "$GITHUB_OUTPUT"
            echo "upstream_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UPSTREAM_TAG="$(jq -r '.tag_name' <<< "$RELEASE_JSON")"
          UPSTREAM_URL="$(jq -r '.html_url' <<< "$RELEASE_JSON")"
          UPSTREAM_NAME="$(jq -r '.name' <<< "$RELEASE_JSON")"
          VERSION="${UPSTREAM_TAG#desktop-v}"

          [[ -n "$UPSTREAM_TAG" && "$UPSTREAM_TAG" != "null" ]] || { echo "Missing upstream tag"; exit 1; }
          [[ -n "$VERSION" && "$VERSION" != "$UPSTREAM_TAG" ]] || { echo "Could not parse version from upstream tag"; exit 1; }

          STATUS="$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' "https://api.github.com/repos/${REPO}/releases/tags/${UPSTREAM_TAG}")"

          if [[ "$STATUS" == "200" ]]; then
            SHOULD_BUILD=false
            echo "Release ${UPSTREAM_TAG} already exists in ${REPO}"
          else
            SHOULD_BUILD=true
            echo "Release ${UPSTREAM_TAG} does not exist in ${REPO}; build required"
          fi

          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"
          echo "upstream_found=true" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "upstream_url=${UPSTREAM_URL}" >> "$GITHUB_OUTPUT"
          echo "upstream_name=${UPSTREAM_NAME}" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl jq tar file squashfs-tools

      - name: Build AppImage
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          chmod +x scripts/build.sh
          scripts/build.sh --tag "${{ needs.check-upstream.outputs.upstream_tag }}"

      - name: Load build metadata
        id: meta
        run: |
          set -euo pipefail
          source work/build.env
          echo "out_appimage=${OUT_APPIMAGE}" >> "$GITHUB_OUTPUT"
          echo "out_sha256_file=${OUT_SHA256_FILE}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream_version=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "out_sha256=${OUT_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Smoke test AppImage runtime
        run: |
          set -euo pipefail
          APPIMAGE="${{ steps.meta.outputs.out_appimage }}"
          chmod +x scripts/verify-appimage.sh
          scripts/verify-appimage.sh "$APPIMAGE"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitwarden-${{ steps.meta.outputs.upstream_version }}-aarch64-appimage
          path: |
            ${{ steps.meta.outputs.out_appimage }}
            ${{ steps.meta.outputs.out_sha256_file }}

      - name: Generate release notes with upstream changelog
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_TAG: ${{ steps.meta.outputs.upstream_tag }}
          UPSTREAM_VERSION: ${{ steps.meta.outputs.upstream_version }}
          UPSTREAM_URL: ${{ needs.check-upstream.outputs.upstream_url }}
          UPSTREAM_NAME: ${{ needs.check-upstream.outputs.upstream_name }}
        run: |
          set -euo pipefail
          api_get_json_auth() {
            local url="$1"
            local attempts=6
            local delay=2
            local n
            for n in $(seq 1 "$attempts"); do
              if body="$(curl -fsSL -H 'Accept: application/vnd.github+json' -H "Authorization: Bearer ${GH_TOKEN}" "$url")"; then
                printf '%s\n' "$body"
                return 0
              fi
              if [[ "$n" -lt "$attempts" ]]; then
                echo "API request failed ($n/$attempts), retrying in ${delay}s: $url"
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            echo "Failed to query API after retries: $url" >&2
            return 1
          }
          RELEASE_JSON="$(api_get_json_auth "https://api.github.com/repos/bitwarden/clients/releases/tags/${UPSTREAM_TAG}")"
          UPSTREAM_BODY="$(jq -r '.body // ""' <<< "$RELEASE_JSON")"

          {
            echo "# Bitwarden ${UPSTREAM_VERSION} (ARM64 AppImage)"
            echo
            echo "This release is rebuilt from official Bitwarden assets for Linux ARM64."
            echo
            echo "## References"
            echo "- Upstream release: [${UPSTREAM_NAME}](${UPSTREAM_URL})"
            echo "- Upstream tag: [\`${UPSTREAM_TAG}\`](https://github.com/bitwarden/clients/releases/tag/${UPSTREAM_TAG})"
            echo "- Upstream repository: [bitwarden/clients](https://github.com/bitwarden/clients)"
            echo
            echo "## Upstream changelog"
            echo
            if [[ -n "${UPSTREAM_BODY}" ]]; then
              printf '%s\n' "${UPSTREAM_BODY}"
            else
              echo "_No upstream changelog text was provided in the release body._"
            fi
            echo
            echo "## Build details"
            echo "- Artifact SHA256: \`${{ steps.meta.outputs.out_sha256 }}\`"
            echo "- Checksum file: \`$(basename "${{ steps.meta.outputs.out_sha256_file }}")\`"
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.upstream_tag }}
          name: Bitwarden ${{ steps.meta.outputs.upstream_version }} (ARM64 AppImage)
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.meta.outputs.out_appimage }}
            ${{ steps.meta.outputs.out_sha256_file }}

  no-op:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No new upstream release
        run: |
          if [[ "${{ needs.check-upstream.outputs.upstream_found }}" != "true" ]]; then
            echo "No matching stable Desktop release with the expected AppImage asset was found."
          else
            echo "No new upstream release to publish."
            echo "Latest upstream tag: ${{ needs.check-upstream.outputs.upstream_tag }}"
          fi
